<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎪 Festival Mode - Playlist Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 700px;
            width: 90%;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 2rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(10px);
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #ccc;
        }
        .hint {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 0.5rem;
        }
        textarea {
            width: 100%;
            min-height: 150px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
            resize: vertical;
            margin-bottom: 1.5rem;
        }
        textarea:focus, input:focus { outline: none; border-color: #f39c12; }
        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            color: white;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .error {
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid #e94560;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .nav-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .nav-link a {
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .nav-link a:hover { color: #e94560; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎪 Festival Mode</h1>
        <p class="subtitle">Create a playlist from your festival lineup</p>

        <div class="card">
            {% if error %}
            <div class="error">⚠️ {{ error }}</div>
            {% endif %}

            <form method="POST" action="/festival/plan">
                <label for="artists">Artists (one per line)</label>
                <p class="hint">Paste your festival lineup — one artist per line</p>
                <textarea
                    name="artists"
                    id="artists"
                    placeholder="Arctic Monkeys&#10;Tame Impala&#10;Billie Eilish&#10;The Strokes&#10;Dua Lipa"
                    required
                ></textarea>

                <div class="form-row">
                    <div>
                        <label for="tracks_per_artist">Songs per artist</label>
                        <input
                            type="number"
                            name="tracks_per_artist"
                            id="tracks_per_artist"
                            value="{{ default_tracks_per_artist }}"
                            min="1"
                            max="20"
                        >
                    </div>
                    <div>
                        <label for="playlist_name">Playlist name (optional)</label>
                        <input
                            type="text"
                            name="playlist_name"
                            id="playlist_name"
                            placeholder="e.g., Primavera 2026 Prep"
                        >
                    </div>
                </div>

                <button type="submit" class="btn">🎪 Generate Festival Playlist</button>
            </form>
        </div>

        <div class="nav-link">
            <a href="/">← Back to AI Vibe Mode</a>
        </div>
    </div>
</body>
</html>
